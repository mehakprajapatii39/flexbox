<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
<style>
    *{
        margin:5px;
        padding:5px;
    }
    nav{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background-color:blue;
        color:white;
    }
    a{
        text-decoration:none;
        color:white;
        text-transform:uppercase;
    }
   a:hover {
    color: lightseagreen;
    background-color: white;
}
    ul{
        display:flex;
        list-style:none;
    }
    .logo {
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>
<body>
    <nav>
          <div class="logo">
            My Logo
          </div>
            <img src="logo.png" alt="logo" height="50px">
          </div>
        <div>
            <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Blog</a></li>
        </ul>
        </div>
    </nav>
</body>
</html>
